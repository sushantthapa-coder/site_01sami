<!DOCTYPE html>
<html>
<head>
  <title>For You Mero sanuu 🌹</title>
  <style>
    body {
      background: linear-gradient(#ffd6e8, #fff);
      font-family: 'Georgia', serif;
      text-align: center;
      padding-top: 60px;
    }

    .rose {
      font-size: 80px;
      display: none;
      animation: bloom 1.5s ease-in-out forwards;
    }

    @keyframes bloom {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    button {
      background-color: #ff4d6d;
      border: none;
      color: white;
      padding: 12px 22px;
      font-size: 16px;
      border-radius: 25px;
      cursor: pointer;
      margin-top: 20px;
    }

    .msg {
      display: none;
      margin-top: 20px;
      font-size: 18px;
      color: #80002a;
    }
  </style>
</head>
<body>

<h2>I made something for you,Baby 💗</h2>

<button onclick="showRose()">Click here </button>

<div class="rose" id="rose">🌹</div>

<div class="msg" id="msg">
  <p>Happy Rose Day sanuu❤️</p>
  <p>I know I couldn’t give this in person,</p>
  <p>So I made this for my nicoo, I love you babyy so much so so so much😘</p>
</div>

<script>
function showRose() {
  document.getElementById("rose").style.display = "block";
  document.getElementById("msg").style.display = "block";
}
</script>

</body>
</html>
